<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2E5C8A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer orbit ring -->
  <ellipse cx="100" cy="100" rx="85" ry="35"
           fill="none"
           stroke="url(#ringGradient)"
           stroke-width="3"
           opacity="0.6"
           transform="rotate(-20 100 100)"/>

  <!-- Small orbiting dot -->
  <circle cx="165" cy="75" r="6" fill="#4A90D9" opacity="0.8">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 100 100"
                      to="360 100 100"
                      dur="8s"
                      repeatCount="indefinite"/>
  </circle>

  <!-- Main star -->
  <polygon points="100,25 108,70 155,70 117,98 130,145 100,118 70,145 83,98 45,70 92,70"
           fill="url(#starGradient)"
           filter="url(#glow)"/>

  <!-- Inner highlight on star -->
  <polygon points="100,35 105,68 140,68 112,88 120,120 100,105"
           fill="#FFE55C"
           opacity="0.5"/>

  <!-- Sparkle effects -->
  <g opacity="0.8">
    <circle cx="60" cy="50" r="2" fill="#FFD700">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="60" r="1.5" fill="#FFD700">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="140" cy="140" r="2" fill="#FFD700">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- Magnifying glass handle (subtle, integrated) -->
  <line x1="145" y1="145" x2="175" y2="175"
        stroke="#2E5C8A"
        stroke-width="4"
        stroke-linecap="round"
        opacity="0.3"/>
</svg>
